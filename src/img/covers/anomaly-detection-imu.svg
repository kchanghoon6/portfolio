  </defs>
  <rect width="800" height="450" fill="url(#g)"/>
  <rect width="800" height="450" fill="url(#dots)"/>
  <g opacity="0.4"><rect x="540" y="260" width="40" height="120" rx="6" fill="#ffffff" fill-opacity="0.45"/><rect x="595" y="200" width="40" height="180" rx="6" fill="#ffffff" fill-opacity="0.45"/><rect x="650" y="150" width="40" height="230" rx="6" fill="#ffffff" fill-opacity="0.45"/><rect x="705" y="230" width="40" height="150" rx="6" fill="#ffffff" fill-opacity="0.45"/></g>
  <rect width="800" height="450" fill="url(#shade)"/>
  <g font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace">
    <rect x="56" y="56" rx="13" ry="13" height="30" width="146" fill="#ffffff" fill-opacity="0.16" stroke="#ffffff" stroke-opacity="0.5"/>
    <text x="74" y="76" fill="#ffffff" font-size="14" letter-spacing="1.5" font-weight="600">STATISTICS</text>
  </g>
  <text x="56" y="320" fill="#ffffff" font-family="'Geist', ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="700" letter-spacing="-0.5"><tspan x="56" dy="0">Anomaly Detection for</tspan><tspan x="56" dy="40">IMU Streams</tspan></text>
