<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cover illustration: a scale-free social network of teal nodes connected by thin edges, with a few violet treated hub nodes whose soft glowing rings spill influence onto neighboring nodes, representing network interference and spillover effects in an A/B test.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13294f"/>
      <stop offset="0.5" stop-color="#0f2036"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <radialGradient id="violetGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#c4b5fd" stop-opacity="0.55"/>
      <stop offset="0.45" stop-color="#a78bfa" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tealNode" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="0.55" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#0e7490"/>
    </radialGradient>
    <radialGradient id="violetNode" cx="0.35" cy="0.3" r="0.8">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </radialGradient>
    <radialGradient id="spill" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="1" y2="0.6">
      <stop offset="0" stop-color="#0a0f1a" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#0a0f1a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Faint plotting grid -->
  <g stroke="#cbe8f5" stroke-width="1" opacity="0.07">
    <line x1="160" y1="40" x2="160" y2="410"/>
    <line x1="320" y1="40" x2="320" y2="410"/>
    <line x1="480" y1="40" x2="480" y2="410"/>
    <line x1="640" y1="40" x2="640" y2="410"/>
    <line x1="100" y1="120" x2="740" y2="120"/>
    <line x1="100" y1="225" x2="740" y2="225"/>
    <line x1="100" y1="330" x2="740" y2="330"/>
  </g>
  <!-- Baseline axis -->
  <line x1="80" y1="400" x2="740" y2="400" stroke="#cbe8f5" stroke-width="1.5" opacity="0.25"/>

  <!-- ===== NETWORK MOTIF ===== -->
  <!-- Edges (thin teal) -->
  <g stroke="#22d3ee" stroke-width="1.4" opacity="0.4" fill="none">
    <!-- Hub A (treated) at 300,180 ; Hub B (treated) at 540,260 -->
    <line x1="300" y1="180" x2="180" y2="120"/>
    <line x1="300" y1="180" x2="170" y2="240"/>
    <line x1="300" y1="180" x2="240" y2="310"/>
    <line x1="300" y1="180" x2="400" y2="110"/>
    <line x1="300" y1="180" x2="420" y2="220"/>
    <line x1="300" y1="180" x2="540" y2="260"/>
    <line x1="540" y1="260" x2="420" y2="220"/>
    <line x1="540" y1="260" x2="620" y2="160"/>
    <line x1="540" y1="260" x2="660" y2="290"/>
    <line x1="540" y1="260" x2="600" y2="350"/>
    <line x1="540" y1="260" x2="450" y2="330"/>
    <line x1="540" y1="260" x2="400" y2="110"/>
    <line x1="240" y1="310" x2="450" y2="330"/>
    <line x1="620" y1="160" x2="660" y2="290"/>
    <line x1="180" y1="120" x2="400" y2="110"/>
    <line x1="170" y1="240" x2="240" y2="310"/>
  </g>

  <!-- Spillover glow rings on neighbors of treated hubs -->
  <circle cx="420" cy="220" r="34" fill="url(#spill)"/>
  <circle cx="400" cy="110" r="32" fill="url(#spill)"/>
  <circle cx="450" cy="330" r="30" fill="url(#spill)"/>
  <circle cx="170" cy="240" r="28" fill="url(#spill)"/>
  <circle cx="620" cy="160" r="28" fill="url(#spill)"/>

  <!-- Soft violet glow halos around treated hubs -->
  <circle cx="300" cy="180" r="58" fill="url(#violetGlow)"/>
  <circle cx="540" cy="260" r="54" fill="url(#violetGlow)"/>

  <!-- Regular teal nodes -->
  <g>
    <circle cx="180" cy="120" r="9" fill="url(#tealNode)"/>
    <circle cx="170" cy="240" r="8" fill="url(#tealNode)"/>
    <circle cx="240" cy="310" r="9" fill="url(#tealNode)"/>
    <circle cx="400" cy="110" r="10" fill="url(#tealNode)"/>
    <circle cx="420" cy="220" r="9" fill="url(#tealNode)"/>
    <circle cx="620" cy="160" r="8" fill="url(#tealNode)"/>
    <circle cx="660" cy="290" r="9" fill="url(#tealNode)"/>
    <circle cx="600" cy="350" r="8" fill="url(#tealNode)"/>
    <circle cx="450" cy="330" r="9" fill="url(#tealNode)"/>
  </g>

  <!-- Faint neighbor highlight rings (violet, thin) on spillover nodes -->
  <g fill="none" stroke="#c4b5fd" stroke-width="1.3" opacity="0.5">
    <circle cx="420" cy="220" r="14"/>
    <circle cx="400" cy="110" r="15"/>
    <circle cx="450" cy="330" r="14"/>
    <circle cx="170" cy="240" r="13"/>
    <circle cx="620" cy="160" r="13"/>
  </g>

  <!-- Treated hub nodes (violet, larger) -->
  <circle cx="300" cy="180" r="15" fill="url(#violetNode)"/>
  <circle cx="300" cy="180" r="22" fill="none" stroke="#c4b5fd" stroke-width="1.6" opacity="0.7"/>
  <circle cx="540" cy="260" r="14" fill="url(#violetNode)"/>
  <circle cx="540" cy="260" r="20" fill="none" stroke="#c4b5fd" stroke-width="1.6" opacity="0.7"/>

  <!-- Top-left vignette to keep page pill tag readable -->
  <rect x="0" y="0" width="300" height="120" fill="url(#vignette)"/>
</svg>