<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Steel through-arch pedestrian footbridge spanning a river, with a faint vibration waveform threading through the arch and small structural-health sensor nodes on the deck">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef4fc"/>
      <stop offset="0.45" stop-color="#dbe8fa"/>
      <stop offset="1" stop-color="#c2d6f2"/>
    </linearGradient>
    <radialGradient id="sun" cx="72%" cy="26%" r="50%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.55" stop-color="#eef4fc" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#eef4fc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9dc0ee"/>
      <stop offset="0.45" stop-color="#5b8fe0"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="archG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e40af"/>
      <stop offset="0.55" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="deckG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1e40af"/>
      <stop offset="0.5" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#0f2148"/>
    </linearGradient>
    <linearGradient id="pierG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#0b1736"/>
    </linearGradient>
    <linearGradient id="vignette" x1="0" y1="0" x2="0.85" y2="0.6">
      <stop offset="0" stop-color="#0b1736" stop-opacity="0.34"/>
      <stop offset="0.26" stop-color="#0b1736" stop-opacity="0.06"/>
      <stop offset="0.46" stop-color="#0b1736" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="800" height="450" fill="url(#sky)"/>
  <rect width="800" height="450" fill="url(#sun)"/>

  <!-- distant hills -->
  <path d="M0 286 C120 268 210 280 320 274 C460 266 560 282 700 272 C740 269 770 272 800 270 L800 304 L0 304 Z" fill="#c2d6f2" opacity="0.7"/>
  <path d="M0 292 C150 282 250 296 400 288 C540 281 660 296 800 286 L800 304 L0 304 Z" fill="#aecbef" opacity="0.85"/>

  <!-- faint spectrum bars (anomaly-detector motif), low opacity, upper-left of span -->
  <g fill="#1e40af" opacity="0.10">
    <rect x="150" y="206" width="7" height="34" rx="2"/>
    <rect x="162" y="190" width="7" height="50" rx="2"/>
    <rect x="174" y="214" width="7" height="26" rx="2"/>
    <rect x="186" y="178" width="7" height="62" rx="2"/>
    <rect x="198" y="200" width="7" height="40" rx="2"/>
    <rect x="210" y="220" width="7" height="20" rx="2"/>
  </g>

  <!-- water -->
  <rect x="0" y="304" width="800" height="146" fill="url(#water)"/>
  <g stroke="#dbe8fa" stroke-linecap="round" opacity="0.45">
    <line x1="90" y1="334" x2="190" y2="334" stroke-width="2"/>
    <line x1="520" y1="350" x2="650" y2="350" stroke-width="2"/>
    <line x1="240" y1="378" x2="330" y2="378" stroke-width="2.5"/>
    <line x1="600" y1="398" x2="710" y2="398" stroke-width="2.5"/>
  </g>

  <!-- ===== THROUGH-ARCH FOOTBRIDGE ===== deck baseline y=304, span x 175..625 -->

  <!-- arch reflection in water (faint) -->
  <path d="M175 304 Q400 452 625 304" fill="none" stroke="#0f2148" stroke-width="8" opacity="0.11"/>

  <!-- end abutment piers -->
  <rect x="170" y="304" width="14" height="74" fill="url(#pierG)"/>
  <rect x="616" y="304" width="14" height="74" fill="url(#pierG)"/>

  <!-- main steel arch (rises well above the deck — the hero) -->
  <path d="M175 304 Q400 70 625 304" fill="none" stroke="url(#archG)" stroke-width="11" stroke-linecap="round"/>
  <!-- crisp highlight on the arch crown so it reads against the sky -->
  <path d="M175 304 Q400 82 625 304" fill="none" stroke="#0ea5e9" stroke-width="2.4" opacity="0.7"/>
  <!-- subtle inner shade line -->
  <path d="M188 304 Q400 96 612 304" fill="none" stroke="#0b1736" stroke-width="1.4" opacity="0.25"/>

  <!-- vertical hangers from arch to deck -->
  <g stroke="#1e40af" stroke-width="1.9" opacity="0.8">
    <line x1="230" y1="304" x2="230" y2="256"/>
    <line x1="285" y1="304" x2="285" y2="220"/>
    <line x1="340" y1="304" x2="340" y2="197"/>
    <line x1="400" y1="304" x2="400" y2="190"/>
    <line x1="460" y1="304" x2="460" y2="197"/>
    <line x1="515" y1="304" x2="515" y2="220"/>
    <line x1="570" y1="304" x2="570" y2="256"/>
  </g>
  <!-- arch base gusset nodes -->
  <circle cx="175" cy="304" r="5" fill="#1e3a8a"/>
  <circle cx="625" cy="304" r="5" fill="#1e3a8a"/>

  <!-- deck -->
  <rect x="160" y="301" width="480" height="9" rx="2" fill="url(#deckG)"/>
  <rect x="160" y="298" width="480" height="3" fill="#0ea5e9" opacity="0.5"/>
  <!-- railing -->
  <line x1="170" y1="293" x2="630" y2="293" stroke="#1e3a8a" stroke-width="1.4" opacity="0.55"/>
  <g stroke="#1e3a8a" stroke-width="1.5" opacity="0.55">
    <line x1="200" y1="301" x2="200" y2="293"/>
    <line x1="260" y1="301" x2="260" y2="293"/>
    <line x1="320" y1="301" x2="320" y2="293"/>
    <line x1="380" y1="301" x2="380" y2="293"/>
    <line x1="460" y1="301" x2="460" y2="293"/>
    <line x1="520" y1="301" x2="520" y2="293"/>
    <line x1="580" y1="301" x2="580" y2="293"/>
  </g>

  <!-- approach ramps to the banks -->
  <path d="M40 322 L160 304 L160 310 L40 328 Z" fill="url(#deckG)" opacity="0.9"/>
  <path d="M760 322 L640 304 L640 310 L760 328 Z" fill="url(#deckG)" opacity="0.9"/>

  <!-- ===== TECH MOTIF: vibration waveform threading through the arch ===== -->
  <path d="M205 236 C232 236 242 214 268 214 C294 214 302 252 328 252 C354 252 362 204 388 204 C414 204 420 248 446 248 C472 248 480 214 506 214 C532 214 542 246 568 246 C588 246 596 232 612 232" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.42" stroke-linecap="round"/>
  <!-- anomaly spike: the single warm accent, used sparingly -->
  <path d="M446 248 L457 196 L465 280 L474 248" fill="none" stroke="#f59e0b" stroke-width="2.3" opacity="0.9" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- sensor nodes on the deck -->
  <g>
    <circle cx="285" cy="301" r="4.2" fill="#0ea5e9"/>
    <circle cx="285" cy="301" r="8.5" fill="none" stroke="#0ea5e9" stroke-width="1.2" opacity="0.4"/>
    <circle cx="455" cy="301" r="4.4" fill="#f59e0b"/>
    <circle cx="455" cy="301" r="8.5" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.55"/>
    <circle cx="570" cy="301" r="4.2" fill="#0ea5e9"/>
    <circle cx="570" cy="301" r="8.5" fill="none" stroke="#0ea5e9" stroke-width="1.2" opacity="0.4"/>
  </g>

  <!-- top-left vignette to keep the white pill tag readable -->
  <rect width="800" height="450" fill="url(#vignette)"/>
</svg>