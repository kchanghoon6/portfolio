<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Statistics A/B testing cover with two overlapping distribution curves, control A and treatment B, and a shaded effect region on a faint plotting grid">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13294f"/>
      <stop offset="0.5" stop-color="#0f2036"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.62" cy="0.40" r="0.75">
      <stop offset="0" stop-color="#0891b2" stop-opacity="0.30"/>
      <stop offset="0.55" stop-color="#0891b2" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="curveA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="curveB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="effect" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#67e8f9" stop-opacity="0.10"/>
      <stop offset="0.5" stop-color="#a78bfa" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#a78bfa" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="tagVig" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070c16" stop-opacity="0.82"/>
      <stop offset="0.6" stop-color="#070c16" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#070c16" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>

  <!-- faint plotting grid -->
  <g stroke="#cbe8f5" stroke-width="1" opacity="0.07">
    <line x1="120" y1="70" x2="120" y2="360"/>
    <line x1="220" y1="70" x2="220" y2="360"/>
    <line x1="320" y1="70" x2="320" y2="360"/>
    <line x1="420" y1="70" x2="420" y2="360"/>
    <line x1="520" y1="70" x2="520" y2="360"/>
    <line x1="620" y1="70" x2="620" y2="360"/>
    <line x1="720" y1="70" x2="720" y2="360"/>
    <line x1="80" y1="110" x2="760" y2="110"/>
    <line x1="80" y1="170" x2="760" y2="170"/>
    <line x1="80" y1="230" x2="760" y2="230"/>
    <line x1="80" y1="290" x2="760" y2="290"/>
  </g>

  <!-- baseline / axis -->
  <line x1="80" y1="360" x2="760" y2="360" stroke="#cbe8f5" stroke-width="1.5" opacity="0.28"/>
  <line x1="80" y1="360" x2="80" y2="90" stroke="#cbe8f5" stroke-width="1.5" opacity="0.16"/>

  <!-- shaded effect / significance region between means (clipped to baseline by curves overlapping) -->
  <path d="M 360 360 C 400 360 420 240 440 240 C 460 240 480 360 520 360 Z" fill="url(#effect)"/>

  <!-- Curve A (control) -->
  <path d="M 130 360 C 230 360 290 130 360 130 C 430 130 490 360 590 360 Z" fill="url(#curveA)"/>
  <path d="M 130 360 C 230 360 290 130 360 130 C 430 130 490 360 590 360" fill="none" stroke="#22d3ee" stroke-width="2.6"/>

  <!-- Curve B (treatment), shifted right + slightly higher -->
  <path d="M 280 360 C 380 360 440 108 510 108 C 580 108 640 360 740 360 Z" fill="url(#curveB)"/>
  <path d="M 280 360 C 380 360 440 108 510 108 C 580 108 640 360 740 360" fill="none" stroke="#a78bfa" stroke-width="2.6"/>

  <!-- mean lines -->
  <line x1="360" y1="130" x2="360" y2="360" stroke="#67e8f9" stroke-width="1.4" stroke-dasharray="4 5" opacity="0.6"/>
  <line x1="510" y1="108" x2="510" y2="360" stroke="#c4b5fd" stroke-width="1.4" stroke-dasharray="4 5" opacity="0.6"/>

  <!-- mean dots -->
  <circle cx="360" cy="130" r="4.5" fill="#67e8f9"/>
  <circle cx="360" cy="130" r="9" fill="none" stroke="#67e8f9" stroke-width="1.2" opacity="0.4"/>
  <circle cx="510" cy="108" r="4.5" fill="#c4b5fd"/>
  <circle cx="510" cy="108" r="9" fill="none" stroke="#c4b5fd" stroke-width="1.2" opacity="0.4"/>

  <!-- CI whiskers under each mean -->
  <g stroke="#67e8f9" stroke-width="2" opacity="0.85">
    <line x1="312" y1="388" x2="408" y2="388"/>
    <line x1="312" y1="382" x2="312" y2="394"/>
    <line x1="408" y1="382" x2="408" y2="394"/>
    <circle cx="360" cy="388" r="3.2" fill="#67e8f9" stroke="none"/>
  </g>
  <g stroke="#c4b5fd" stroke-width="2" opacity="0.9">
    <line x1="466" y1="408" x2="554" y2="408"/>
    <line x1="466" y1="402" x2="466" y2="414"/>
    <line x1="554" y1="402" x2="554" y2="414"/>
    <circle cx="510" cy="408" r="3.2" fill="#c4b5fd" stroke="none"/>
  </g>

  <!-- small scattered data points -->
  <g fill="#cbe8f5" opacity="0.5">
    <circle cx="300" cy="300" r="2"/>
    <circle cx="335" cy="245" r="2"/>
    <circle cx="385" cy="255" r="2"/>
    <circle cx="420" cy="320" r="2"/>
    <circle cx="475" cy="265" r="2"/>
    <circle cx="540" cy="290" r="2"/>
    <circle cx="565" cy="330" r="2"/>
  </g>

  <!-- top-left readability vignette behind page pill -->
  <rect x="0" y="0" width="300" height="120" fill="url(#tagVig)"/>
</svg>