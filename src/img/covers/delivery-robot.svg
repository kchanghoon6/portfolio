<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A campus autonomous delivery robot shown in crisp side profile carrying a parcel, with a planned route line, checkpoint markers, and sensor arcs detecting obstacles, on a deep navy-to-blue gradient.">
  <defs>
