<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Cinematic vector view looking down an ice-hockey rink: cool blue ice receding to a vanishing point with soft arena-light reflections and a faint analytics scatter and trend curve, red center line and foreshortened blue lines, center and end-zone faceoff circles, a far goal crease, in a deep navy arena with overhead light bloom and a soft stand structure.">
