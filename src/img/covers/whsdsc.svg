<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Wharton High School Data Science Competition — ice hockey analytics">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="0.55" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" fill-opacity="0.14"/>
    </pattern>
    <linearGradient id="shade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#0b1220" stop-opacity="0.42"/>
      <stop offset="0.6" stop-color="#0b1220" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#g)"/>
  <rect width="800" height="450" fill="url(#dots)"/>
  <!-- faint rink markings -->
  <g stroke="#ffffff" stroke-opacity="0.16" fill="none">
    <circle cx="600" cy="225" r="120" stroke-width="3"/>
    <line x1="600" y1="70" x2="600" y2="380" stroke-width="3"/>
    <circle cx="600" cy="225" r="10" fill="#ffffff" fill-opacity="0.18" stroke="none"/>
  </g>
  <!-- crossed hockey sticks + puck -->
  <g transform="translate(600,235)" opacity="0.92">
    <!-- stick 1 -->
    <g transform="rotate(28)">
      <rect x="-12" y="-150" width="20" height="250" rx="10" fill="#ffffff" fill-opacity="0.9"/>
      <path d="M -12 92 L -12 78 L 70 96 L 70 122 Z" fill="#ffffff" fill-opacity="0.9"/>
    </g>
    <!-- stick 2 (mirrored) -->
    <g transform="rotate(-28) scale(-1,1)">
      <rect x="-12" y="-150" width="20" height="250" rx="10" fill="#ffffff" fill-opacity="0.78"/>
      <path d="M -12 92 L -12 78 L 70 96 L 70 122 Z" fill="#ffffff" fill-opacity="0.78"/>
    </g>
    <!-- puck -->
    <ellipse cx="0" cy="150" rx="34" ry="13" fill="#0b1220" fill-opacity="0.92"/>
    <ellipse cx="0" cy="146" rx="34" ry="13" fill="#10203a"/>
    <ellipse cx="0" cy="146" rx="34" ry="13" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="2"/>
  </g>
</svg>