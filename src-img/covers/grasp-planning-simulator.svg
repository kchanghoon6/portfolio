<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Grasp Planning Simulator">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4338ca"/>
      <stop offset="0.55" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#ffffff" fill-opacity="0.16"/>
    </pattern>
    <linearGradient id="shade" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#000000" stop-opacity="0.38"/>
      <stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#g)"/>
  <rect width="800" height="450" fill="url(#dots)"/>
  <g stroke="#ffffff" stroke-width="3" fill="none" opacity="0.35">
        <circle cx="600" cy="150" r="26" fill="#ffffff" fill-opacity="0.18"/>
        <circle cx="690" cy="250" r="20" fill="#ffffff" fill-opacity="0.18"/>
        <circle cx="560" cy="300" r="22" fill="#ffffff" fill-opacity="0.18"/>
        <line x1="600" y1="150" x2="690" y2="250"/>
        <line x1="600" y1="150" x2="560" y2="300"/>
        <line x1="690" y1="250" x2="560" y2="300"/></g>
  <rect width="800" height="450" fill="url(#shade)"/>
  <g font-family="ui-monospace, 'SFMono-Regular', Menlo, monospace">
    <rect x="56" y="56" rx="13" ry="13" height="30" width="129" fill="#ffffff" fill-opacity="0.16" stroke="#ffffff" stroke-opacity="0.5"/>
    <text x="74" y="76" fill="#ffffff" font-size="14" letter-spacing="1.5" font-weight="600">ROBOTICS</text>
  </g>
  <text x="56" y="320" fill="#ffffff" font-family="'Geist', ui-sans-serif, system-ui, sans-serif" font-size="34" font-weight="700" letter-spacing="-0.5"><tspan x="56" dy="0">Grasp Planning</tspan><tspan x="56" dy="40">Simulator</tspan></text>
</svg>